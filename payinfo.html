<section class="section__payinfo">
    <div class="container">
        <form class="row">
            <div class="col-lg-7">
                <div class="b-form">
                    <h4>Contact Information</h4>

                    <div class="input__group">
                        <input type="text" placeholder="Email">
                    </div>

                    <h4>Billing Address</h4>

                    <div class="input__group double">
                        <input type="text" placeholder="FIrst Name">
                        <input type="text" placeholder="Last Name">
                    </div>

                    <div class="input__group">
                        <input type="text" placeholder="Address">
                    </div>

                    <div class="input__group">
                        <input type="text" placeholder="City">
                    </div>

                    <div class="input__group double">
                        <select>
                            <option disabled selected data-display="Country">Nothing</option>
                            <option>Country1</option>
                            <option>Country2</option>
                            <option>Country3</option>
                            <option>Country4</option>
                            <option>Country5</option>
                        </select>
                        <input type="text" placeholder="Postal Code">
                    </div>

                    <h4>Payment</h4>

                    <p>All transactions are secure and encrypted.</p>

                    <ul class="tabs__head js-tab-head">
                        <li><a href="#" class="active js-tab-head" data-target="#info-body-1">Credit Card</a></li>
                        <li><a href="#" class="js-tab-head" data-target="#info-body-2">PayPal</a></li>
                    </ul>

                    <ul class="tabs__body">
                        <li class="js-tab-body" id="info-body-1" style="display: block;">
                            <div class="input__group">
                                <span class="icon-padlock"></span>
                                <input type="text" placeholder="Card Number">
                            </div>
                            <div class="input__group">
                                <input type="text" placeholder="Name on Card">
                            </div>

                            <div class="input__group double">
                                <span class="icon-question"></span>
                                <input type="text" placeholder="Expiration Date (MM/YY)">
                                <input type="text" placeholder="Security Code">
                            </div>
                        </li>
                        <li class="js-tab-body" id="info-body-2">
                            <div class="input__group">
                                <input type="text" placeholder="Card Number">
                            </div>
                            <div class="input__group">
                                <input type="text" placeholder="Name on Card">
                            </div>

                            <div class="input__group double">
                                <input type="text" placeholder="Expiration Date (MM/YY)">
                                <input type="text" placeholder="Security Code">
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="col-lg-5 d-flex flex-column justify-content-between">
                <div class="info__top">
                    <div class="b-form">
                        <h4>Your Order</h4>

                        <table class="order__table">
                            <tr>
                                <td>
                                    <div class="product__title js-product-title">2v2 Rating</div>
                                    <div class="product__option">Rating 1600/2100</div>
                                </td>
                                <td>
                                    <div class="quantity__val">1</div>
                                </td>
                                <td class="d-flex justify-content-end">
                                    <div class="product__price js-product-price">Є <span class="price js-price">145.00</span></div>
                                </td>
                            </tr>
                        </table>
                    </div>


                    <div class="b-form">
                        <h4>Discount</h4>

                        <div class="input__group form__apply js-form-apply">
                            <input type="text" placeholder="Discount Code">
                            <div class="btn">
                                <a href="#">Apply</a>
                            </div>
                        </div>
                    </div>


                    <div class="total__price">
                        <h4>Total</h4>
                        <div class="current__price">€ <span class="js-current-price">145.00</span></div>
                    </div>
                </div>

                <div class="submit__group">
                    <input type="submit" value="Continue to payment">
                </div>
            </div>
        </form>
    </div>
</section>
